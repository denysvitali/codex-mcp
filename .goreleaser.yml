version: 2

project_name: codex-mcp

builds:
  - main: ./cmd/codex-mcp
    binary: codex-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  algorithm: sha256
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^(docs|ci|style)(\(.+\))?:'

release:
  draft: false
